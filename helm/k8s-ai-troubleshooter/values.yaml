namespaceOverride: k8s-ai

imagePullSecrets: []

backend:
  replicaCount: 1
  image:
    repository: docker.io/rahultipledocker/k8s-ai-backend
    tag: 306818cee078cab0b513e4f078653ed032d46d3a
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  env:
    PROMETHEUS_URL: "http://prometheus-server.monitoring.svc.cluster.local"
    LOKI_URL: "http://loki-gateway.monitoring.svc.cluster.local"
    REDIS_URL: "redis://k8s-ai-redis:6379/0"
    DATABASE_URL: "postgresql://k8s_ai:k8s_ai_password@k8s-ai-postgres:5432/k8s_ai"
    KUBECTL_TERMINAL_ALLOW_MUTATIONS: "true"
    KUBECTL_TERMINAL_TIMEOUT_SECONDS: "30"
  openai:
    existingSecret: ""
    secretName: k8s-ai-secret
    apiKey: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  replicaCount: 1
  image:
    repository: docker.io/rahultipledocker/k8s-ai-frontend
    tag: 306818cee078cab0b513e4f078653ed032d46d3a
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 80
    nodePort: 30080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

rbac:
  create: true
  serviceAccountName: k8s-ai-sa

postgres:
  enabled: true
  image: postgres:16-alpine
  database: k8s_ai
  username: k8s_ai
  password: k8s_ai_password
  persistence:
    enabled: true
    type: hostPath
    hostPath: /var/lib/k8s-ai/postgres
    hostPathType: DirectoryOrCreate
    storage: 5Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  enabled: true
  image: redis:7-alpine
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
