apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ai-frontend
  namespace: {{ include "k8s-ai-troubleshooter.namespace" . }}
  labels:
    app: k8s-ai-frontend
    {{- include "k8s-ai-troubleshooter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: k8s-ai-frontend
  template:
    metadata:
      labels:
        app: k8s-ai-frontend
        {{- include "k8s-ai-troubleshooter.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: frontend
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          {{- toYaml .Values.frontend.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-ai-frontend
  namespace: {{ include "k8s-ai-troubleshooter.namespace" . }}
  labels:
    app: k8s-ai-frontend
    {{- include "k8s-ai-troubleshooter.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    app: k8s-ai-frontend
  ports:
  - port: {{ .Values.frontend.service.port }}
    targetPort: 80
    {{- if eq .Values.frontend.service.type "NodePort" }}
    nodePort: {{ .Values.frontend.service.nodePort }}
    {{- end }}
