apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ai-backend
  namespace: {{ include "k8s-ai-troubleshooter.namespace" . }}
  labels:
    app: k8s-ai-backend
    {{- include "k8s-ai-troubleshooter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: k8s-ai-backend
  template:
    metadata:
      labels:
        app: k8s-ai-backend
        {{- include "k8s-ai-troubleshooter.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.rbac.serviceAccountName }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: backend
        image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
        ports:
        - containerPort: 8000
        env:
        {{- range $key, $value := .Values.backend.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ default .Values.backend.openai.secretName .Values.backend.openai.existingSecret }}
              key: OPENAI_API_KEY
              optional: true
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 20
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-ai-backend
  namespace: {{ include "k8s-ai-troubleshooter.namespace" . }}
  labels:
    app: k8s-ai-backend
    {{- include "k8s-ai-troubleshooter.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: k8s-ai-backend
  ports:
  - port: {{ .Values.backend.service.port }}
    targetPort: 8000
