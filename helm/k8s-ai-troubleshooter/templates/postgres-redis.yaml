{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: k8s-ai-postgres-secret
  namespace: {{ include "k8s-ai-troubleshooter.namespace" . }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
---
apiVersion: apps/v1
kind: {{ ternary "StatefulSet" "Deployment" (and .Values.postgres.persistence.enabled (eq .Values.postgres.persistence.type "pvc")) }}
metadata:
  name: k8s-ai-postgres
  namespace: {{ include "k8s-ai-troubleshooter.namespace" . }}
spec:
  {{- if and .Values.postgres.persistence.enabled (eq .Values.postgres.persistence.type "pvc") }}
  serviceName: k8s-ai-postgres
  {{- end }}
  replicas: 1
  selector:
    matchLabels:
      app: k8s-ai-postgres
  template:
    metadata:
      labels:
        app: k8s-ai-postgres
    spec:
      containers:
      - name: postgres
        image: {{ .Values.postgres.image }}
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: k8s-ai-postgres-secret
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        resources:
          {{- toYaml .Values.postgres.resources | nindent 10 }}
      {{- if or (not .Values.postgres.persistence.enabled) (eq .Values.postgres.persistence.type "hostPath") }}
      volumes:
      - name: data
        {{- if .Values.postgres.persistence.enabled }}
        hostPath:
          path: {{ .Values.postgres.persistence.hostPath | quote }}
          type: {{ .Values.postgres.persistence.hostPathType | quote }}
        {{- else }}
        emptyDir: {}
        {{- end }}
      {{- end }}
  {{- if and .Values.postgres.persistence.enabled (eq .Values.postgres.persistence.type "pvc") }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: ["ReadWriteOnce"]
      {{- if .Values.postgres.persistence.storageClassName }}
      storageClassName: {{ .Values.postgres.persistence.storageClassName | quote }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.postgres.persistence.storage }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-ai-postgres
  namespace: {{ include "k8s-ai-troubleshooter.namespace" . }}
spec:
  selector:
    app: k8s-ai-postgres
  ports:
  - port: 5432
    targetPort: 5432
{{- end }}
{{- if .Values.redis.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ai-redis
  namespace: {{ include "k8s-ai-troubleshooter.namespace" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-ai-redis
  template:
    metadata:
      labels:
        app: k8s-ai-redis
    spec:
      containers:
      - name: redis
        image: {{ .Values.redis.image }}
        ports:
        - containerPort: 6379
        resources:
          {{- toYaml .Values.redis.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-ai-redis
  namespace: {{ include "k8s-ai-troubleshooter.namespace" . }}
spec:
  selector:
    app: k8s-ai-redis
  ports:
  - port: 6379
    targetPort: 6379
{{- end }}
