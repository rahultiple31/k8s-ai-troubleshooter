{{- if and (not .Values.backend.openai.existingSecret) .Values.backend.openai.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.backend.openai.secretName }}
  namespace: {{ include "k8s-ai-troubleshooter.namespace" . }}
  labels:
    {{- include "k8s-ai-troubleshooter.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENAI_API_KEY: {{ .Values.backend.openai.apiKey | quote }}
{{- end }}
