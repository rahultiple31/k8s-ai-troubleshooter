namespaceOverride: k8s-ai

imagePullSecrets:
  - name: ghcr-secret

backend:
  image:
    repository: ghcr.io/rahultiple31/k8s-ai-backend
    tag: latest
    pullPolicy: Always
  openai:
    existingSecret: k8s-ai-secret

frontend:
  image:
    repository: ghcr.io/rahultiple31/k8s-ai-frontend
    tag: latest
    pullPolicy: Always
  service:
    type: NodePort
    nodePort: 30080
