namespaceOverride: k8s-ai

imagePullSecrets: []

backend:
  image:
    repository: docker.io/rahultipledocker/k8s-ai-backend
    tag: d51d7355a4c38aef5774519de7210459e23915d8
    pullPolicy: Always
  openai:
    existingSecret: k8s-ai-secret

frontend:
  image:
    repository: docker.io/rahultipledocker/k8s-ai-frontend
    tag: d51d7355a4c38aef5774519de7210459e23915d8
    pullPolicy: Always
  service:
    type: NodePort
    nodePort: 30080

postgres:
  persistence:
    enabled: true
    type: hostPath
    hostPath: /var/lib/k8s-ai/postgres
    hostPathType: DirectoryOrCreate
