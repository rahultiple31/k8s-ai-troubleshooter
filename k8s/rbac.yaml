apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-ai-sa
  namespace: k8s-ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-ai-readonly
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "nodes", "events", "services", "endpoints", "persistentvolumeclaims", "persistentvolumes", "namespaces", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-ai-readonly-binding
subjects:
- kind: ServiceAccount
  name: k8s-ai-sa
  namespace: k8s-ai
roleRef:
  kind: ClusterRole
  name: k8s-ai-readonly
  apiGroup: rbac.authorization.k8s.io
