apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ai-frontend
  namespace: k8s-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-ai-frontend
  template:
    metadata:
      labels:
        app: k8s-ai-frontend
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      containers:
      - name: frontend
        image: ghcr.io/rahultiple31/k8s-ai-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-ai-frontend
  namespace: k8s-ai
spec:
  type: NodePort
  selector:
    app: k8s-ai-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
