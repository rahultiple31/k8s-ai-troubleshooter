apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ai-frontend
  namespace: k8s-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-ai-frontend
  template:
    metadata:
      labels:
        app: k8s-ai-frontend
    spec:
      containers:
      - name: frontend
        image: docker.io/rahultipledocker/k8s-ai-frontend:cae73143c795bed8ae2b228e2565fc8a0dcc0579
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-ai-frontend
  namespace: k8s-ai
spec:
  type: NodePort
  selector:
    app: k8s-ai-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
