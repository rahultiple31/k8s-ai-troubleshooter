apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ai-backend
  namespace: k8s-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-ai-backend
  template:
    metadata:
      labels:
        app: k8s-ai-backend
    spec:
      serviceAccountName: k8s-ai-sa
      containers:
      - name: backend
        image: k8s-ai-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: PROMETHEUS_URL
          value: "http://prometheus-server.monitoring.svc.cluster.local"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: k8s-ai-secret
              key: OPENAI_API_KEY
              optional: true
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-ai-backend
  namespace: k8s-ai
spec:
  selector:
    app: k8s-ai-backend
  ports:
  - port: 8000
    targetPort: 8000
