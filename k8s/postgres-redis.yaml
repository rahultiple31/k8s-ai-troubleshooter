apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: k8s-ai
spec:
  replicas: 1
  selector: {matchLabels: {app: redis}}
  template:
    metadata: {labels: {app: redis}}
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports: [{containerPort: 6379}]
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: k8s-ai
spec:
  selector: {app: redis}
  ports: [{port: 6379, targetPort: 6379}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: k8s-ai
spec:
  replicas: 1
  selector: {matchLabels: {app: postgres}}
  template:
    metadata: {labels: {app: postgres}}
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - {name: POSTGRES_DB, value: k8s_ai}
        - {name: POSTGRES_USER, value: k8s_ai}
        - {name: POSTGRES_PASSWORD, value: k8s_ai_password}
        ports: [{containerPort: 5432}]
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: k8s-ai
spec:
  selector: {app: postgres}
  ports: [{port: 5432, targetPort: 5432}]
