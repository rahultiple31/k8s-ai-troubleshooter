name: Build Kubernetes AI Troubleshooter

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - master

permissions:
  contents: write

concurrency:
  group: k8s-ai-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ github.sha }}
  DOCKERHUB_NAMESPACE: rahultipledocker
  BACKEND_IMAGE_NAME: k8s-ai-backend
  FRONTEND_IMAGE_NAME: k8s-ai-frontend

jobs:
  build:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image names
        id: image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "::error::GitHub secret DOCKERHUB_USERNAME is required."
            exit 1
          fi
          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::GitHub secret DOCKERHUB_TOKEN is required."
            exit 1
          fi
          DOCKERHUB_NAMESPACE="$(echo '${{ env.DOCKERHUB_NAMESPACE }}' | tr '[:upper:]' '[:lower:]')"
          echo "backend_image=${DOCKERHUB_NAMESPACE}/${{ env.BACKEND_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${DOCKERHUB_NAMESPACE}/${{ env.FRONTEND_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.image.outputs.backend_image }}:${{ env.IMAGE_TAG }}
            ${{ steps.image.outputs.backend_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.image.outputs.frontend_image }}:${{ env.IMAGE_TAG }}
            ${{ steps.image.outputs.frontend_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Helm image tags
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          tag = os.environ["IMAGE_TAG"]
          files = [
              Path("helm/k8s-ai-troubleshooter/values.yaml"),
              Path("helm/k8s-ai-troubleshooter/values-dev.yaml"),
          ]

          for path in files:
              lines = path.read_text().splitlines()
              section = None
              updated = []
              for line in lines:
                  if line.startswith("backend:"):
                      section = "backend"
                  elif line.startswith("frontend:"):
                      section = "frontend"
                  elif line and not line.startswith(" ") and line.endswith(":"):
                      section = None

                  if section in {"backend", "frontend"} and line.strip().startswith("tag:"):
                      indent = line[: len(line) - len(line.lstrip())]
                      line = f"{indent}tag: {tag}"

                  updated.append(line)

              path.write_text("\n".join(updated) + "\n")
          PY

      - name: Commit Helm image tag updates
        run: |
          if git diff --quiet -- helm/k8s-ai-troubleshooter/values.yaml helm/k8s-ai-troubleshooter/values-dev.yaml; then
            echo "Helm image tags are already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/k8s-ai-troubleshooter/values.yaml helm/k8s-ai-troubleshooter/values-dev.yaml
          git commit -m "chore: update deployed image tags ${IMAGE_TAG} [skip ci]"
          git push
