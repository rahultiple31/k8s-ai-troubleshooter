name: Build Kubernetes AI Troubleshooter

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

concurrency:
  group: k8s-ai-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  BACKEND_IMAGE_NAME: k8s-ai-backend
  FRONTEND_IMAGE_NAME: k8s-ai-frontend

jobs:
  build:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image names
        id: image
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${{ env.REGISTRY }}/${OWNER_LC}/${{ env.BACKEND_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${{ env.REGISTRY }}/${OWNER_LC}/${{ env.FRONTEND_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.image.outputs.backend_image }}:${{ env.IMAGE_TAG }}
            ${{ steps.image.outputs.backend_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.image.outputs.frontend_image }}:${{ env.IMAGE_TAG }}
            ${{ steps.image.outputs.frontend_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  configure-cluster-secrets:
    name: Configure cluster secrets for ArgoCD
    runs-on: ubuntu-latest
    needs: build
    env:
      NAMESPACE: k8s-ai
      GHCR_PULL_SECRET_NAME: ghcr-secret
      KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
      GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      GHCR_PULL_EMAIL: ${{ secrets.GHCR_PULL_EMAIL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Check cluster secret configuration
        id: cluster_config
        run: |
          missing=()
          for name in KUBECONFIG_B64 GHCR_PULL_USERNAME GHCR_PULL_TOKEN GHCR_PULL_EMAIL; do
            if [ -z "${!name}" ]; then
              missing+=("${name}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Skipping cluster secret configuration. Missing GitHub secrets: ${missing[*]}"
          else
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up kubectl
        if: ${{ steps.cluster_config.outputs.configured == 'true' }}
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        if: ${{ steps.cluster_config.outputs.configured == 'true' }}
        run: |
          mkdir -p "${HOME}/.kube"
          raw_kubeconfig="$(printf '%s' "${KUBECONFIG_B64}" | sed 's/\r$//')"
          if printf '%s' "${raw_kubeconfig}" | grep -q 'apiVersion:'; then
            printf '%s\n' "${raw_kubeconfig}" > "${HOME}/.kube/config"
          else
            clean_kubeconfig_b64="$(printf '%s' "${KUBECONFIG_B64}" | tr -d '[:space:]' | sed "s/^[\"']//; s/[\"']$//")"
            if ! printf '%s' "${clean_kubeconfig_b64}" | base64 --decode > "${HOME}/.kube/config"; then
              echo "::error::KUBECONFIG_B64 must contain either raw kubeconfig YAML or valid base64-encoded kubeconfig content."
              exit 1
            fi
          fi
          if ! grep -q 'apiVersion:' "${HOME}/.kube/config"; then
            echo "::error::KUBECONFIG_B64 decoded successfully, but the result does not look like a kubeconfig file."
            exit 1
          fi
          if ! grep -q 'clusters:' "${HOME}/.kube/config"; then
            echo "::error::KUBECONFIG_B64 does not contain a kubeconfig clusters section."
            exit 1
          fi
          chmod 600 "${HOME}/.kube/config"

      - name: Ensure application namespace exists
        if: ${{ steps.cluster_config.outputs.configured == 'true' }}
        run: |
          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Create or update GHCR image pull secret
        if: ${{ steps.cluster_config.outputs.configured == 'true' }}
        run: |
          kubectl create secret docker-registry "${GHCR_PULL_SECRET_NAME}" \
            -n "${NAMESPACE}" \
            --docker-server="${REGISTRY}" \
            --docker-username="${GHCR_PULL_USERNAME}" \
            --docker-password="${GHCR_PULL_TOKEN}" \
            --docker-email="${GHCR_PULL_EMAIL}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create or update OpenAI secret
        if: ${{ steps.cluster_config.outputs.configured == 'true' && env.OPENAI_API_KEY != '' }}
        run: |
          kubectl create secret generic k8s-ai-secret \
            -n "${NAMESPACE}" \
            --from-literal=OPENAI_API_KEY="${OPENAI_API_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -
