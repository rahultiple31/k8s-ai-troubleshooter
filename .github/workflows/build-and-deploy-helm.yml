name: Build and Deploy Kubernetes AI Troubleshooter

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - stage
          - prod
      namespace:
        description: "Kubernetes namespace"
        required: true
        default: "k8s-ai"
      deploy:
        description: "Deploy using Helm after image build"
        required: true
        default: true
        type: boolean
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

concurrency:
  group: k8s-ai-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}
  BACKEND_IMAGE_NAME: k8s-ai-backend
  FRONTEND_IMAGE_NAME: k8s-ai-frontend
  HELM_RELEASE: k8s-ai-troubleshooter

jobs:
  build:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.image.outputs.backend_image }}
      frontend_image: ${{ steps.image.outputs.frontend_image }}
      owner_lc: ${{ steps.image.outputs.owner_lc }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image names
        id: image
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${{ env.REGISTRY }}/${OWNER_LC}/${{ env.BACKEND_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${{ env.REGISTRY }}/${OWNER_LC}/${{ env.FRONTEND_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.image.outputs.backend_image }}:${{ env.IMAGE_TAG }}
            ${{ steps.image.outputs.backend_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.image.outputs.frontend_image }}:${{ env.IMAGE_TAG }}
            ${{ steps.image.outputs.frontend_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy with Helm
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event.inputs.deploy == 'true'
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Create namespace
        run: |
          kubectl create namespace "${{ github.event.inputs.namespace || 'k8s-ai' }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Create OpenAI secret
        if: env.OPENAI_API_KEY != ''
        run: |
          kubectl -n "${{ github.event.inputs.namespace || 'k8s-ai' }}" create secret generic k8s-ai-secret \
            --from-literal=OPENAI_API_KEY="${OPENAI_API_KEY}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm lint
        run: helm lint ./helm/k8s-ai-troubleshooter

      - name: Helm upgrade install
        run: |
          helm upgrade --install "${{ env.HELM_RELEASE }}" ./helm/k8s-ai-troubleshooter \
            --namespace "${{ github.event.inputs.namespace || 'k8s-ai' }}" \
            --set namespaceOverride="${{ github.event.inputs.namespace || 'k8s-ai' }}" \
            --set backend.image.repository="${{ needs.build.outputs.backend_image }}" \
            --set backend.image.tag="${{ env.IMAGE_TAG }}" \
            --set backend.openai.existingSecret="k8s-ai-secret" \
            --set frontend.image.repository="${{ needs.build.outputs.frontend_image }}" \
            --set frontend.image.tag="${{ env.IMAGE_TAG }}" \
            --wait --timeout 10m

      - name: Show deployment status
        run: |
          kubectl -n "${{ github.event.inputs.namespace || 'k8s-ai' }}" get pods,svc
          kubectl -n "${{ github.event.inputs.namespace || 'k8s-ai' }}" rollout status deployment/k8s-ai-backend --timeout=180s
          kubectl -n "${{ github.event.inputs.namespace || 'k8s-ai' }}" rollout status deployment/k8s-ai-frontend --timeout=180s
